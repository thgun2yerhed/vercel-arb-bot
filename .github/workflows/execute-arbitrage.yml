name: Execute Arbitrage
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Execute arbitrage swaps
        run: |
          node << 'SCRIPT'
          const https = require('https');
          
          const SOL = "So11111111111111111111111111111111111111112";
          const USDC = "EPjFWaLb3odccccVvM4TdcZkS93vXqbNXCLFiRaKVnPU";
          
          function getQuote(inputMint, outputMint, amount) {
            return new Promise((r) => {
              const timer = setTimeout(() => {
                console.log('TIMEOUT on ' + inputMint);
                r(null);
              }, 3000);
              
              const url = `https://api.jup.ag/swap/v1/quote?inputMint=${inputMint}&outputMint=${outputMint}&amount=${amount}&slippageBps=100`;
              console.log('Fetching: ' + url);
              
              https.get(url, res => {
                clearTimeout(timer);
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => {
                  try { 
                    const json = JSON.parse(d);
                    console.log('Got quote: ' + JSON.stringify(json).substring(0, 100));
                    r(json.outAmount);
                  } catch (e) { 
                    console.log('Parse error: ' + e.message);
                    r(null); 
                  }
                });
              }).on('error', e => {
                clearTimeout(timer);
                console.log('Request error: ' + e.message);
                r(null);
              });
            });
          }
          
          (async () => {
            console.log('[START] Arbitrage execution');
            const q1 = await getQuote(SOL, USDC, 1000000000);
            console.log('Q1 result: ' + q1);
          })();
          SCRIPT
