name: Execute Arbitrage
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Execute arbitrage swaps
        run: |
          node << 'SCRIPT'
          const https = require('https');
          
          const SOL = "So11111111111111111111111111111111111111112";
          const RAY = "4k3Dyjzvzp8eMZWUeNAgYwNe3Hzl7aAy8n9rNHZJcZUz";
          const COPE = "8HGyAAB1yoM1ttS7pnqwRW2jsjQS3MfvHWQE3eznz5oe";
          
          function getQuote(inputMint, outputMint, amount) {
            return new Promise((r) => {
              const timer = setTimeout(() => {
                console.log('TIMEOUT');
                r(null);
              }, 5000);
              
              const url = `https://api.jup.ag/swap/v1/quote?inputMint=${inputMint}&outputMint=${outputMint}&amount=${amount}&slippageBps=50`;
              console.log('Quote: ' + outputMint.substring(0, 8) + '...');
              
              https.get(url, res => {
                clearTimeout(timer);
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => {
                  try { 
                    const json = JSON.parse(d);
                    if (json.outAmount) r(parseInt(json.outAmount));
                    else { console.log('Error: ' + json.error); r(null); }
                  } catch (e) { r(null); }
                });
              }).on('error', () => {
                clearTimeout(timer);
                r(null);
              });
            });
          }
          
          (async () => {
            const q1 = await getQuote(SOL, RAY, 1000000000);
            const q2 = await getQuote(SOL, COPE, 1000000000);
            
            if (q1 && q2) {
              const spread = Math.abs(q1 - q2) / Math.max(q1, q2);
              console.log(`SPREAD: ${(spread*100).toFixed(3)}% | RAY: ${q1} | COPE: ${q2}`);
              if (spread > 0.005) console.log('*** ARBITRAGE LIVE ***');
            }
          })();
          SCRIPT
