name: Gasless Arbitrage Execution
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Execute gasless arbitrage
        env:
          SOLANA_KEY: ${{ secrets.SOLANA_PRIVATE_KEY }}
        run: |
          npm install --save @solana/web3.js @solana/spl-token decimal.js
          node << 'SCRIPT'
          const { Connection, PublicKey, Keypair } = require("@solana/web3.js");
          const https = require('https');
          
          const RPC = "https://api.mainnet-beta.solana.com";
          const SOL = "So11111111111111111111111111111111111111112";
          const USDC = "EPjFWaLb3odccccVvM4TdcZkS93vXqbNXCLFiRaKVnPU";
          
          async function getSwapInstructions(inputMint, outputMint, amount) {
            return new Promise((r) => {
              const url = `https://api.jup.ag/swap/v1/quote?inputMint=${inputMint}&outputMint=${outputMint}&amount=${amount}&slippageBps=50`;
              https.get(url, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => {
                  try { 
                    const json = JSON.parse(d);
                    r(json);
                  } catch { 
                    r(null); 
                  }
                });
              });
            });
          }
          
          (async () => {
            console.log('[GASLESS] Starting atomic arbitrage');
            
            // Get swap quotes
            const q1 = await getSwapInstructions(SOL, USDC, 100000000);
            const q2 = await getSwapInstructions(USDC, SOL, q1?.outAmount || 0);
            
            if (q1 && q2) {
              const profit = parseInt(q2.outAmount || 0) - 100000000;
              console.log(`Profit potential: ${profit} lamports ($${(profit/1e8*75).toFixed(4)})`);
              
              if (profit > 5000000) {
                console.log('*** ARBITRAGE EXECUTABLE - WOULD SUBMIT WITH FLASH LOAN ***');
              }
            }
          })();
          SCRIPT
