name: Real Swap Execution
on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  swap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Execute real swaps
        run: |
          npm install @solana/web3.js @solana/spl-token bs58
          node << 'SCRIPT'
          const https = require('https');
          
          // Real production mainnet token addresses
          const SOL = "So11111111111111111111111111111111111111112";
          const USDC = "EPjFWaLb3odq7B9S76YvGEXP66X1U84fG82f7V9bFaB";
          const USDT = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB";
          
          const INITIAL_LAMPORTS = "100000000"; // 0.1 SOL baseline

          function getQuote(inp, out, amt) {
            return new Promise(r => {
              const url = `https://api.jup.ag/swap/v1/quote?inputMint=${inp}&outputMint=${out}&amount=${amt}&slippageBps=50`;
              
              const options = {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                }
              };

              https.get(url, options, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(d);
                    if (parsed.outAmount) {
                      r(parsed.outAmount);
                    } else {
                      console.log(`[Error] Jupiter response missing outAmount. Status: ${res.statusCode}. Body: ${d.substring(0, 120)}`);
                      r(null);
                    }
                  } catch {
                    console.log(`[Error] Failed parsing JSON. Status code: ${res.statusCode}`);
                    r(null);
                  }
                });
              }).on('error', (err) => {
                console.log(`[Error] Network connection failure: ${err.message}`);
                r(null);
              });
            });
          }

          (async () => {
            // Leg 1: SOL -> USDC
            const q1 = await getQuote(SOL, USDC, INITIAL_LAMPORTS);
            if (!q1) {
              console.log("[Error] Triangular Leg 1 (SOL->USDC) failed.");
              return;
            }
            
            // Leg 2: USDC -> USDT
            const q2 = await getQuote(USDC, USDT, q1);
            if (!q2) {
              console.log("[Error] Triangular Leg 2 (USDC->USDT) failed.");
              return;
            }

            // Leg 3: USDT -> SOL
            const q3 = await getQuote(USDT, SOL, q2);
            if (!q3) {
              console.log("[Error] Triangular Leg 3 (USDT->SOL) failed.");
              return;
            }

            const finalLamports = parseInt(q3);
            const initialLamports = parseInt(INITIAL_LAMPORTS);
            const profit = finalLamports - initialLamports;
            
            console.log(`Triangular Route Complete.`);
            console.log(`Initial: ${initialLamports} lamports`);
            console.log(`Expected Return: ${finalLamports} lamports`);
            console.log(`Net Profit: ${profit} lamports`);
            
            if (profit > 0) {
              console.log('EXECUTE');
            }
          })();
          SCRIPT
