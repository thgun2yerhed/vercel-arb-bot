name: Real Swap Execution
on:
  workflow_dispatch:

jobs:
  swap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Execute real swaps
        env:
          SOLANA_PRIVATE_KEY: ${{ secrets.SOLANA_PRIVATE_KEY }}
        run: |
          npm install @solana/web3.js bs58@5
          node << 'SCRIPT'
          const { Connection, Keypair, VersionedTransaction } = require('@solana/web3.js');
          const bs58 = require('bs58');

          const SOL = "So11111111111111111111111111111111111111112";
          const USDC = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v";
          const USDT = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB";
          const INITIAL_LAMPORTS = "10000000";
          const MIN_PROFIT = 6000;

          async function getQuote(inp, out, amt) {
            const url = `https://api.jup.ag/swap/v1/quote?inputMint=${inp}&outputMint=${out}&amount=${amt}&slippageBps=50`;
            const res = await fetch(url);
            return res.ok ? await res.json() : null;
          }

          (async () => {
            if (!process.env.SOLANA_PRIVATE_KEY) {
              console.log("[Error] SOLANA_PRIVATE_KEY missing from environment.");
              process.exit(1);
            }

            let secretKey;
            try {
              // Priority 1: Attempt JSON array parsing (Solana CLI format)
              secretKey = Uint8Array.from(JSON.parse(process.env.SOLANA_PRIVATE_KEY));
            } catch {
              // Priority 2: Fallback to Base58 string decoding (Phantom format)
              secretKey = bs58.decode(process.env.SOLANA_PRIVATE_KEY);
            }
            
            const wallet = Keypair.fromSecretKey(secretKey);
            const connection = new Connection("https://api.mainnet-beta.solana.com");

            const q1 = await getQuote(SOL, USDC, INITIAL_LAMPORTS);
            if (!q1) return console.log("[Error] Leg 1 failed.");
            
            const q2 = await getQuote(USDC, USDT, q1.outAmount);
            if (!q2) return console.log("[Error] Leg 2 failed.");

            const q3 = await getQuote(USDT, SOL, q2.outAmount);
            if (!q3) return console.log("[Error] Leg 3 failed.");

            const profit = parseInt(q3.outAmount) - parseInt(INITIAL_LAMPORTS);
            console.log(`Net Profit: ${profit} lamports`);

            if (profit > MIN_PROFIT) {
              console.log('EXECUTE: Building and signing transaction...');
              
              const swapReq = await fetch('https://api.jup.ag/swap/v1/swap', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  quoteResponse: q1,
                  userPublicKey: wallet.publicKey.toString(),
                  wrapAndUnwrapSol: true,
                  prioritizationFeeLamports: 5000
                })
              });
              
              const { swapTransaction } = await swapReq.json();
              if (!swapTransaction) return console.log("[Error] Failed to build transaction.");

              const transaction = VersionedTransaction.deserialize(Buffer.from(swapTransaction, 'base64'));
              transaction.sign([wallet]);
              
              const txid = await connection.sendRawTransaction(transaction.serialize());
              console.log(`Transaction live: https://solscan.io/tx/${txid}`);
            } else {
              console.log(`Aborted: Profit of ${profit} does not cover ${MIN_PROFIT} lamport threshold.`);
            }
          })();
          SCRIPT
