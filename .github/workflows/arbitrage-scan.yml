name: Solana Arbitrage Scan
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Scan for arbitrage
        run: |
          node -e "
          const https = require('https');
          
          async function getPrice(id) {
            return new Promise((r, reject) => {
              const timer = setTimeout(() => reject(new Error('Timeout')), 5000);
              const url = \`https://api.coingecko.com/api/v3/simple/price?ids=\${id}&vs_currencies=usd\`;
              https.get(url, res => {
                clearTimeout(timer);
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => {
                  try { r(JSON.parse(d)); } catch { r(null); }
                });
              }).on('error', reject);
            });
          }
          
          (async () => {
            try {
              const data = await getPrice('solana');
              const solPrice = data?.solana?.usd || null;
              console.log(\`SOL Price: \$\${solPrice}\`);
              console.log('Arbitrage scanner running - monitoring spreads');
            } catch (e) {
              console.log('Error: ' + e.message);
            }
          })();
          "
